<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Animation: Final Assembly Stages (Corrected)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }
        .animation-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        .animation-container {
            width: 95%;
            max-width: 1200px; 
            background-color: #FFFFFF;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.07);
            padding: 20px;
        }
        svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Styling for new department icons */
        .department-icon-new path,
        .department-icon-new circle,
        .department-icon-new rect,
        .department-icon-new polygon,
        .department-icon-new line {
            fill: #DDD; /* Light gray fill for better visibility */
            stroke: #333; /* Dark stroke */
            stroke-width: 1px;
            vector-effect: non-scaling-stroke; /* Keeps stroke width consistent if group is scaled */
        }

        /* Basic Styling */
        .department-area {
            fill: #e9ecef; 
            stroke: #ced4da;
            stroke-width: 1px;
            rx: 6px; 
        }
        .department-label {
            font-size: 8px; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 600; 
            fill: #343a40; 
            text-anchor: middle;
        }
        .conveyor-belt {
            fill: #adb5bd; 
            rx: 2px;
        }
        .conveyor-lines {
            stroke: #dee2e6; 
            stroke-dasharray: 2, 2;
            animation: conveyorLinesMove 0.5s linear infinite;
        }
        .vertical-conveyor-lines { 
            stroke: #dee2e6;
            stroke-dasharray: 2, 2;
            animation: conveyorLinesMoveVertical 0.5s linear infinite;
        }
        
        /* Wood Line Specific Shapes & Colors */
        .raw-wood-square { fill: #A16207; }
        .processed-wood-triangle { fill: #D4A373; stroke: #A16207; stroke-width: 0.5; }
        .sanded-neck-assembly-triangle { fill: #E6B88A; stroke: #D4A373; stroke-width: 0.5; } 
        .painted-neck-assembly-triangle { fill: #A02128; stroke: #7E292C; stroke-width: 0.5; } 
        .polished-neck-assembly-triangle { fill: #e76f51; stroke: #A02128; stroke-width: 0.5; } 


        /* Metal Line Specific Shapes & Colors */
        .raw-metal-square { fill: #6B7280; }
        .metal-spine-rect { fill: #CED4DA; stroke: #6B7280; stroke-width: 0.5px; } 
        .processed-metal-hardware-triangle { fill: #ADB5BD; stroke: #6B7280; stroke-width: 1; } 
        .finished-metal-hardware-triangle { fill: #E9ECEF; stroke: #ADB5BD; stroke-width: 1; } 

        /* Electronics Line Specific Shapes & Colors */
        .raw-electronics-components circle { fill: #4CAF50; stroke: #2E7D32; stroke-width: 0.2px;}
        .raw-electronics-components rect { fill: #2196F3; stroke: #0D47A1; stroke-width: 0.2px;}
        .assembled-electronics-module { fill: #212529; stroke: #000000; stroke-width: 0.5px; }

        /* Final Product & QA */
        .finished-guitar-silhouette { fill: #BB854B; stroke: #010101; stroke-width:0.5px; }
        .qa-pass-indicator { fill: #22C55E; /* Green */ opacity: 0; } /* Base style, animation applied per instance */
        .qa-fail-indicator { fill: #EF4444; /* Red-500 */ opacity: 0; } /* Base style for fail indicator */


        @keyframes conveyorLinesMove { to { stroke-dashoffset: -4; } }
        @keyframes conveyorLinesMoveVertical { to { stroke-dashoffset: -4; } }
        @keyframes qaPulse {
            0%, 100% { r: 0; opacity: 0; } 
            10%, 90% { r: 3; opacity: 0.7; }
            50% { r: 5; opacity: 1; }
        }

        /* --- Wood Processing Department Machine Animation --- */
        /* Applied to the machine icon in Wood Proc. Dept. */
        /* Pulses briefly when a wood part is being processed. */
        @keyframes machineBriefPulse {
            0%, 100% { stroke: #475569; stroke-width: 1.5px; transform: scale(1); } /* Normal state */
            50% { stroke: #e67e22; stroke-width: 2.5px; transform: scale(1.05); }   /* Active processing style: orange, thicker, slightly larger */
        }

        .wood-processing-machine-icon {
            /* Apply the brief pulse animation three times, staggered for each wood part */
            /* Each pulse lasts 0.6s (2% of 30s total cycle, from wood entering at 8% to processed wood appearing at 10%) */
            animation-name: machineBriefPulse, machineBriefPulse, machineBriefPulse;
            animation-duration: 0.6s, 0.6s, 0.6s;
            animation-iteration-count: 1, 1, 1; /* Run each pulse once */
            animation-fill-mode: none, none, none; /* Return to base style after each pulse (defined by 0%/100% of keyframe) */
            /* Delays for each pulse, timed with wood part arrival at Wood Proc. Dept. (8% of 30s = 2.4s) */
            /* Part 1: starts at 2.4s */
            /* Part 2: starts at 2.4s + 6s item delay = 8.4s */
            /* Part 3: starts at 2.4s + 12s item delay = 14.4s */
            animation-delay: 2.4s, 8.4s, 14.4s;
        }

        /*
            NOTE ON SCALABILITY OF PART ANIMATION:
            The current method of animating multiple identical parts (raw wood, metal pieces, etc.)
            by duplicating SVG elements and applying staggered CSS animations via separate classes
            is suitable for a fixed, small number of items as demonstrated in this example.

            For scenarios requiring:
            - A variable number of parts,
            - A significantly larger number of parts, or
            - More complex interactions and state management for each part,
            a JavaScript-based animation approach would be more scalable and maintainable.
            JavaScript could dynamically create/remove SVG elements, manage their animation timings
            (e.g., using the Web Animations API or a library), and handle complex state logic,
            thereby reducing repetitive HTML and CSS definitions.
        */
        /* --- Wood Processing Line Animations --- */
        /* Total animation duration: 30s */
        /* Conveyor Y for wood line: 85px (top of piece) */
        /* Overhead feedback conveyor Y: 15px (top of piece) */
        /* Polishing department conveyor Y: 185px (top of piece) */

        .raw-wood-square-1 { animation: rawWoodFlow 30s linear infinite 0s; }
        .raw-wood-square-2 { animation: rawWoodFlow 30s linear infinite 6s; } 
        .raw-wood-square-3 { animation: rawWoodFlow 30s linear infinite 12s; }
        @keyframes rawWoodFlow { 
            0% { transform: translate(30px, 85px); opacity: 0; } /* Starts invisible at raw wood input (X=30, Y=85) */
            1% { transform: translate(30px, 85px); opacity: 1; } /* Becomes visible at raw wood input */
            8% { transform: translate(190px, 85px); opacity: 1; } /* Moves to Wood Proc. Dept. entrance (X=190) */
            9% { opacity: 0; transform: translate(190px, 85px); } /* Enters Wood Proc. Dept. (becomes invisible) */
            100% { opacity: 0; transform: translate(190px, 85px); } /* Stays invisible */
        }

        .processed-wood-triangle-1 { animation: processedWoodToSanding 30s linear infinite 0s; }
        .processed-wood-triangle-2 { animation: processedWoodToSanding 30s linear infinite 6s; }
        .processed-wood-triangle-3 { animation: processedWoodToSanding 30s linear infinite 12s; }
        @keyframes processedWoodToSanding { 
            0%    { transform: translate(290px, 85px); opacity: 0; } /* Starts invisible after Wood Proc. (X=290, Y=85) */
            9%   { transform: translate(290px, 85px); opacity: 0; } /* Remains invisible, waiting for processing time */
            10%   { transform: translate(290px, 85px); opacity: 1; } /* Exits Wood Proc. Dept., becomes visible */
            16%   { transform: translate(340px, 85px); opacity: 1; } /* Moves to Neck Assembly area (X=340) */
            23%   { transform: translate(340px, 85px); opacity: 1; } /* Waits at X=340 for metal spine to arrive and align. Spine arrives at 23%. */
            /* Spine joins (now aligned) and both travel to sanding */
            26%   { transform: translate(450px, 85px); opacity: 1; } /* Moves together with spine to 1st Sanding Dept. entrance (X=450) */
            27%   { opacity: 0; transform: translate(450px, 85px); } /* Enters 1st Sanding Dept. (becomes invisible) */
            100%  { opacity: 0; transform: translate(450px, 85px); } /* Stays invisible */
        }
        
        .sanded-neck-assembly-triangle-1 { animation: sandedWoodToPainting 30s linear infinite 0s; }
        .sanded-neck-assembly-triangle-2 { animation: sandedWoodToPainting 30s linear infinite 6s; }
        .sanded-neck-assembly-triangle-3 { animation: sandedWoodToPainting 30s linear infinite 12s; }
        @keyframes sandedWoodToPainting { 
            0% { transform: translate(550px, 85px); opacity: 0; } /* Starts invisible after 1st Sanding (X=550, Y=85) */
            27% { transform: translate(550px, 85px); opacity: 0; } /* Remains invisible, waiting for sanding time */
            29% { transform: translate(550px, 85px); opacity: 1; } /* Exits 1st Sanding Dept., becomes visible */
            38% { transform: translate(690px, 85px); opacity: 1; } /* Moves to Painting Dept. entrance (X=690) */
            40% { opacity: 0; transform: translate(690px, 85px); } /* Enters Painting Dept. (becomes invisible) */
            100% { opacity: 0; transform: translate(690px, 85px); } /* Stays invisible */
        }

        .painted-neck-assembly-triangle-1 { animation: paintedWoodToPolishingDept 30s linear infinite 0s; }
        .painted-neck-assembly-triangle-2 { animation: paintedWoodToPolishingDept 30s linear infinite 6s; }
        .painted-neck-assembly-triangle-3 { animation: paintedWoodToPolishingDept 30s linear infinite 12s; }
        @keyframes paintedWoodToPolishingDept { 
            0%    { transform: translate(790px, 85px); opacity: 0; } /* Starts invisible after Painting (X=790, Y=85) */
            40%   { transform: translate(790px, 85px); opacity: 0; } /* Remains invisible, waiting for painting time */
            42%   { transform: translate(790px, 85px); opacity: 1; } /* Exits Painting Dept., becomes visible */
            46%   { transform: translate(790px, 15px); opacity: 1; } /* Moves up to overhead conveyor (Y=15) at X=790 */
            56%   { transform: translate(510px, 15px); opacity: 1; } /* Travels left on overhead conveyor to X=510 (aligns with Polishing Dept. vertical conveyor) */
            60%   { transform: translate(510px, 185px); opacity: 1; } /* Moves down vertical conveyor to Polishing Dept. input (Y=185) */
            62%   { opacity: 0; transform: translate(510px, 185px); } /* Enters Polishing Dept. (becomes invisible) */
            100%  { opacity: 0; transform: translate(510px, 185px); } /* Stays invisible */
        }

        .polished-neck-assembly-triangle-1 { animation: polishedNeckToAssembly 30s linear infinite 0s; }
        .polished-neck-assembly-triangle-2 { animation: polishedNeckToAssembly 30s linear infinite 6s; }
        .polished-neck-assembly-triangle-3 { animation: polishedNeckToAssembly 30s linear infinite 12s; }
        @keyframes polishedNeckToAssembly { 
            0% { transform: translate(620px, 185px); opacity: 0; } /* Starts invisible after Polishing (X=620, Y=185) */
            62% { transform: translate(620px, 185px); opacity: 0; } /* Remains invisible, waiting for polishing time */
            64% { transform: translate(620px, 185px); opacity: 1; } /* Exits Polishing Dept., becomes visible */
            70% { transform: translate(620px, 285px); opacity: 1; } /* Moves down vertical conveyor to Main Assembly line level (Y=285) at X=620 */
            74% { transform: translate(690px, 285px); opacity: 1; } /* Moves to previous Main Assembly Dept. input for necks (X=690) */
            /* MODIFIED: Extended travel to common assembly point X=830 */
            82% { transform: translate(830px, 285px); opacity: 1; } /* Arrives at Main Assembly point X=830 (travel 140px from 690px, took 8%) */
            83% { opacity: 0; transform: translate(830px, 285px); } /* Neck is part of main assembly (becomes invisible at X=830) */
            100% { opacity: 0; transform: translate(830px, 285px); } /* Stays invisible */
        }


        /* --- Metal Processing Line Animations --- */
        /* Conveyor Y for metal line: 285px */
        .raw-metal-square-1 { animation: rawMetalFlowNewY 30s linear infinite 0.5s; }
        .raw-metal-square-2 { animation: rawMetalFlowNewY 30s linear infinite 6.5s; }
        .raw-metal-square-3 { animation: rawMetalFlowNewY 30s linear infinite 12.5s; }
        @keyframes rawMetalFlowNewY { 
            0% { transform: translate(30px, 285px); opacity: 0; } /* Starts invisible at raw metal input (X=30, Y=285) */
            1% { transform: translate(30px, 285px); opacity: 1; } /* Becomes visible at raw metal input */
            10% { transform: translate(190px, 285px); opacity: 1; } /* Moves to Metal Proc. Dept. entrance (X=190) */
            12% { opacity: 0; transform: translate(190px, 285px); } /* Enters Metal Proc. Dept. (becomes invisible) */
            100% { opacity: 0; transform: translate(190px, 285px); } /* Stays invisible */
        }

        .metal-spine-rect-1 { animation: metalSpineJoinsWood 30s linear infinite 0.5s; }
        .metal-spine-rect-2 { animation: metalSpineJoinsWood 30s linear infinite 6.5s; }
        .metal-spine-rect-3 { animation: metalSpineJoinsWood 30s linear infinite 12.5s; }
        @keyframes metalSpineJoinsWood { 
            0%    { transform: translate(290px, 285px); opacity: 0; } /* Starts invisible after Metal Proc. (X=290, Y=285) */
            12%   { transform: translate(290px, 285px); opacity: 0; } /* Remains invisible, waiting for processing time */
            14%   { transform: translate(290px, 285px); opacity: 1; } /* Exits Metal Proc. Dept. (as metal spine), becomes visible */
            18%   { transform: translate(347.5px, 285px); opacity: 1; } /* SYNC: Moves to vertical conveyor base, X adjusted to 347.5px for centering with wood (wood X=340, width 20; spine width 5. 340 + 10 - 2.5 = 347.5) */
            23%   { transform: translate(347.5px, 85px); opacity: 1; }  /* SYNC: Moves up vertical conveyor to Wood Line level (Y=85), aligned with wood triangle at X=347.5. Wood waits at X=340. */
            /* Wood ('processedWoodToSanding') is now at X=340, Y=85. Spine is at X=347.5, Y=85. They are aligned side-by-side/slotted. */
            26%   { transform: translate(450px, 85px); opacity: 1; } /* SYNC: Travels together with wood triangle into 1st Sanding Dept. entrance (X=450) */
            27%   { opacity: 0; transform: translate(450px, 85px); }  /* Enters 1st Sanding Dept. with wood (becomes invisible) */
            100%  { opacity: 0; transform: translate(450px, 85px); } /* Stays invisible */
        }

        /* This animation is for other metal hardware, not the spine that joins the wood. */
        .processed-metal-hardware-triangle-1 { animation: processedMetalToSurfaceNewY 30s linear infinite 1s; }
        .processed-metal-hardware-triangle-2 { animation: processedMetalToSurfaceNewY 30s linear infinite 7s; }
        .processed-metal-hardware-triangle-3 { animation: processedMetalToSurfaceNewY 30s linear infinite 13s; }
        @keyframes processedMetalToSurfaceNewY { 
            0% { transform: translate(290px, 285px); opacity: 0; } /* Starts invisible after Metal Proc. (X=290, Y=285) */
            12% { transform: translate(290px, 285px); opacity: 0; } /* Remains invisible, waiting for processing time (slightly different from spine) */
            15% { transform: translate(290px, 285px); opacity: 1; } /* Exits Metal Proc. Dept., becomes visible */
            25% { transform: translate(450px, 285px); opacity: 1; } /* Moves to Surface Proc. & Anodizing Dept. entrance (X=450) */
            27% { opacity: 0; transform: translate(450px, 285px); } /* Enters Surface Proc. Dept. (becomes invisible) */
            100% { opacity: 0; transform: translate(450px, 285px); } /* Stays invisible */
        }
        
        .finished-metal-hardware-triangle-1 { animation: finishedMetalToAssemblyNewY 30s linear infinite 1s; }
        .finished-metal-hardware-triangle-2 { animation: finishedMetalToAssemblyNewY 30s linear infinite 7s; }
        .finished-metal-hardware-triangle-3 { animation: finishedMetalToAssemblyNewY 30s linear infinite 13s; }
        @keyframes finishedMetalToAssemblyNewY { 
            0% { transform: translate(550px, 285px); opacity: 0; } /* Starts invisible after Surface Proc. (X=550, Y=285) */
            27% { transform: translate(550px, 285px); opacity: 0; } /* Remains invisible, waiting for surface processing time */
            29% { transform: translate(550px, 285px); opacity: 1; } /* Exits Surface Proc. Dept., becomes visible */
            40% { transform: translate(690px, 285px); opacity: 1; } /* Moves to previous Main Assembly Dept. input for metal hardware (X=690) */
            /* MODIFIED: Extended travel to common assembly point X=830 */
            51% { transform: translate(830px, 285px); opacity: 1; } /* Arrives at Main Assembly point X=830 (travel 140px from 690px, took 11%) */
            52% { opacity: 0; transform: translate(830px, 285px); } /* Metal hardware is part of main assembly (becomes invisible at X=830) */
            100% { opacity: 0; transform: translate(830px, 285px); } /* Stays invisible */
        }

        /* --- Electronics Line Animations --- */
        /* Conveyor Y for electronics line: 405px */
        .raw-electronics-components-1 { animation: rawElectronicsFlow 30s linear infinite 1.5s; }
        .raw-electronics-components-2 { animation: rawElectronicsFlow 30s linear infinite 7.5s; }
        .raw-electronics-components-3 { animation: rawElectronicsFlow 30s linear infinite 13.5s; }
        @keyframes rawElectronicsFlow {
            0% { transform: translate(30px, 405px); opacity: 0; } /* Starts invisible at raw electronics input (X=30, Y=405) */
            1% { transform: translate(30px, 405px); opacity: 1; } /* Becomes visible at raw electronics input */
            10% { transform: translate(190px, 405px); opacity: 1; } /* Moves to Electronics Assembly Dept. entrance (X=190) */
            12% { opacity: 0; transform: translate(190px, 405px); } /* Enters Electronics Assembly Dept. (becomes invisible) */
            100% { opacity: 0; transform: translate(190px, 405px); } /* Stays invisible */
        }

        .assembled-electronics-module-1 { animation: assembledElectronicsToAssembly 30s linear infinite 1.5s; }
        .assembled-electronics-module-2 { animation: assembledElectronicsToAssembly 30s linear infinite 7.5s; }
        .assembled-electronics-module-3 { animation: assembledElectronicsToAssembly 30s linear infinite 13.5s; }
        @keyframes assembledElectronicsToAssembly {
            0% { transform: translate(290px, 405px); opacity: 0; } /* Starts invisible after Electronics Assembly (X=290, Y=405) */
            12% { transform: translate(290px, 405px); opacity: 0; } /* Remains invisible, waiting for assembly time */
            14% { transform: translate(290px, 405px); opacity: 1; } /* Exits Electronics Assembly Dept., becomes visible */
            25% { transform: translate(440px, 405px); opacity: 1; } /* Moves to vertical conveyor base (X=440, part is 20px wide, conveyor at X=445, so 440 is center of part on conveyor) */
            32% { transform: translate(440px, 285px); opacity: 1; } /* Moves up vertical conveyor to Main Assembly line level (Y=285) */
            38% { transform: translate(690px, 285px); opacity: 1; } /* Moves to previous Main Assembly Dept. input for electronics (X=690) */
            /* MODIFIED: Extended travel to common assembly point X=830 */
            41.5% { transform: translate(830px, 285px); opacity: 1; } /* Arrives at Main Assembly point X=830 (travel 140px from 690px, took 3.5%) */
            42.5% { opacity: 0; transform: translate(830px, 285px); } /* Electronics module is part of main assembly (becomes invisible at X=830) */
            100% { opacity: 0; transform: translate(830px, 285px); } /* Stays invisible */
        }
        
        /* --- Final Product and QA Animations --- */
        .finished-guitar-silhouette-1 { animation: finalGuitarFlow 30s linear infinite 0s; }
        /* MODIFIED: Second guitar uses finalGuitarFlowFail animation */
        .finished-guitar-silhouette-2 { animation: finalGuitarFlowFail 30s linear infinite 7s; }
        .finished-guitar-silhouette-3 { animation: finalGuitarFlow 30s linear infinite 14s; }
        @keyframes finalGuitarFlow {
            /* MODIFIED: Guitar appearance delayed until Polished Neck (latest part) arrives at 82% and is processed by 83% */
            0%   , 82% { transform: translate(830px, 285px) scale(0.6); opacity: 0; } /* Stays invisible until all parts are assembled */
            83%  { transform: translate(830px, 285px) scale(0.6); opacity: 1; } /* Finished guitar appears at assembly point (X=830) */
            90%  { transform: translate(930px, 285px) scale(0.6); opacity: 1; } /* Arrives at QA station (X=930) */
            /* MODIFIED: Extended path for QA passed items */
            92.5% { transform: translate(930px, 285px) scale(0.6); opacity: 1; } /* Stays at QA station during check */
            95%  { transform: translate(1100px, 285px) scale(0.6); opacity: 1; } /* Moves to Shipping/Output area (X=1100) */
            96%  { opacity: 0; transform: translate(1100px, 285px) scale(0.6); }   /* Disappears from Shipping */
            100% { opacity: 0; transform: translate(1100px, 285px) scale(0.6); }   /* Stays faded */
        }

        /* Animation for guitars that FAIL QA */
        @keyframes finalGuitarFlowFail {
            0%   , 82% { transform: translate(830px, 285px) scale(0.6); opacity: 0; } /* Stays invisible until all parts are assembled */
            83%  { transform: translate(830px, 285px) scale(0.6); opacity: 1; } /* Finished guitar appears at assembly point (X=830) */
            90%  { transform: translate(930px, 285px) scale(0.6); opacity: 1; } /* Moves to Quality Control Dept. entrance (X=930) */
            /* MODIFIED FOR QA FAIL: Guitar fades out at QA station */
            92%  { transform: translate(930px, 285px) scale(0.6); opacity: 0; } /* Fades out AT QA station */
            100% { transform: translate(930px, 285px) scale(0.6); opacity: 0; } /* Stays faded at QA station */
        }

        .qa-pass-indicator-1 { animation: qaPassAnim 30s linear infinite 0s; }
        /* MODIFIED: Second guitar's pass indicator is disabled */
        .qa-pass-indicator-2 { animation: none; opacity: 0; }
        .qa-pass-indicator-3 { animation: qaPassAnim 30s linear infinite 14s; }
        @keyframes qaPassAnim {
            /* MODIFIED: QA pulse timing adjusted to new guitar timing at QA station (approx 90% to 92%) */
            0%, 90.5% { opacity: 0; r:0; }      /* Indicator invisible until guitar is at QA station */
            91%    { opacity: 1; r:3; }      /* QA check starts: Indicator appears, small radius */
            91.2%  { r:5; }                  /* Pulse bigger */
            91.4%  { r:3; }                  /* Pulse smaller */
            91.6%  { r:5; }                  /* Pulse bigger */
            91.8%  { r:3; }                  /* Pulse smaller, final part of pulse */
            92%    { opacity: 0; r:0; }      /* QA check ends: Indicator disappears as guitar leaves/finishes QA */
            100%   { opacity: 0; r:0; }      /* Stays invisible */
        }

        /* Animation for QA Fail indicator pulse */
        .qa-fail-indicator-2 { animation: qaFailPulseAnim 30s linear infinite 7s; }
        @keyframes qaFailPulseAnim {
            /* Timed to activate when the second guitar (failed one) is at QA station */
            /* Guitar is at QA from 90% to 92% in its 'finalGuitarFlowFail' animation */
            0%, 90.5% { opacity: 0; r:0; }      /* Indicator invisible */
            91%    { opacity: 1; r:3; }      /* Fail pulse starts */
            91.2%  { r:5; }
            91.4%  { r:3; }
            91.6%  { r:5; }
            91.8%  { r:3; }
            92%    { opacity: 0; r:0; }      /* Fail pulse ends as guitar fades */
            100%   { opacity: 0; r:0; }
        }
    </style>
</head>
<body>
    <div class="animation-title">Shark Guitars Factory Flow: Full Process</div>
    <div class="animation-container">
        <svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg"> 

            <rect x="20" y="85" width="170" height="20" class="conveyor-belt"/> 
            <line x1="20" y1="95" x2="190" y2="95" class="conveyor-lines" stroke-width="2"/>
            <rect x="280" y="85" width="170" height="20" class="conveyor-belt"/> 
            <line x1="280" y1="95" x2="450" y2="95" class="conveyor-lines" stroke-width="2"/>
            <rect x="540" y="85" width="150" height="20" class="conveyor-belt"/> 
            <line x1="540" y1="95" x2="690" y2="95" class="conveyor-lines" stroke-width="2"/>
            
            <rect x="20" y="285" width="760" height="20" class="conveyor-belt"/> 
            <line x1="20" y1="295" x2="780" y2="295" class="conveyor-lines" stroke-width="2"/>

            <rect x="345" y="105" width="20" height="180" class="conveyor-belt"/> 
            <line x1="355" y1="105" x2="355" y2="285" class="vertical-conveyor-lines" stroke-width="2"/> 

            <rect x="785" y="25" width="20" height="60" class="conveyor-belt"/> 
            <line x1="795" y1="25" x2="795" y2="85" class="vertical-conveyor-lines" stroke-width="2"/>
            <rect x="515" y="15" width="280" height="20" class="conveyor-belt"/> 
            <line x1="515" y1="25" x2="795" y2="25" class="conveyor-lines" stroke-width="2"/>
            <rect x="510" y="25" width="20" height="160" class="conveyor-belt"/> 
            <line x1="520" y1="25" x2="520" y2="185" class="vertical-conveyor-lines" stroke-width="2"/>

                Staggered animation for these duplicated parts is achieved by:
                1. Defining a base CSS animation (e.g., @keyframes rawWoodFlow).
                2. Applying this animation to each SVG element instance via a unique class.
                3. Assigning a different 'animation-delay' in the CSS rule for each instance's class

                           .raw-wood-square-2 { animation: rawWoodFlow ... 6s; }, etc.).

                1. Add a new SVG element in this section, incrementing the class name:
                   <rect class="raw-wood-square-4" width="20" height="20" rx="2"/>
                2. Add a corresponding CSS rule in the <style> section, applying the same base animation

                   .raw-wood-square-4 { animation: rawWoodFlow 30s linear infinite 18s; }
